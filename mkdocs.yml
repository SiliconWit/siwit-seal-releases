site_name: SiliconWit Seal
site_description: Simple, polished OpenPGP file encryption for everyone.
site_author: SiliconWit
site_url: https://siliconwit.github.io/siwit-seal-releases/

repo_name: SiliconWit/siwit-seal-releases
repo_url: https://github.com/SiliconWit/siwit-seal-releases
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/lock
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Install:
      - Overview: install/index.md
      - Linux (.deb): install/linux.md
      - Windows (.msi): install/windows.md
      - macOS: install/macos.md
  - Quick start: quickstart.md
  - Using Seal: using.md
  - FAQ: faq.md
  - Releases: https://github.com/SiliconWit/siwit-seal-releases/releases

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SiliconWit/
    - icon: fontawesome/solid/globe
      link: https://siliconwit.com
  generator: false

extra_css:
  - stylesheets/custom.css

extra_javascript:
  - javascripts/tawk.js
  - javascripts/copyright.js

copyright: Copyright &copy; 2025 SiliconWit
